name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  ip-gate-pre:
    # Pre-build static checks: LICENSE, cosign wiring, headers, sourcemaps in repo,
    # plaintext patterns. Does NOT validate the built artifact — see ip-gate-post.
    uses: ./.github/workflows/ip-gate.yml

  release:
    name: build → ip-gate-post → push → sign
    runs-on: ubuntu-latest
    needs: ip-gate-pre
    steps:
      - uses: actions/checkout@v4

      - name: K-09 gate — Docker runner wheel double-build determinism
        run: |
          set -euo pipefail
          TMP1=$(mktemp -d /tmp/runner-wheel-a.XXXXXX)
          TMP2=$(mktemp -d /tmp/runner-wheel-b.XXXXXX)
          trap 'rm -rf "$TMP1" "$TMP2"' EXIT

          docker build --target runner-builder --no-cache -t ip-k09-runner-a:${{ github.sha }} .
          CID_A=$(docker create ip-k09-runner-a:${{ github.sha }})
          docker cp "$CID_A:/dist" "$TMP1/dist"
          docker rm "$CID_A" >/dev/null

          docker build --target runner-builder --no-cache -t ip-k09-runner-b:${{ github.sha }} .
          CID_B=$(docker create ip-k09-runner-b:${{ github.sha }})
          docker cp "$CID_B:/dist" "$TMP2/dist"
          docker rm "$CID_B" >/dev/null

          HASH_A=$(find "$TMP1/dist" -name '*.whl' -maxdepth 1 -type f -exec sha256sum {} \; | sort | sha256sum | awk '{print $1}')
          HASH_B=$(find "$TMP2/dist" -name '*.whl' -maxdepth 1 -type f -exec sha256sum {} \; | sort | sha256sum | awk '{print $1}')
          echo "runner_wheel_hash_a=$HASH_A"
          echo "runner_wheel_hash_b=$HASH_B"
          if [ -z "$HASH_A" ] || [ -z "$HASH_B" ]; then
            echo "::error::K-09 failed: missing runner wheel artifacts from runner-builder stage"
            exit 1
          fi
          if [ "$HASH_A" != "$HASH_B" ]; then
            echo "::error::K-09 failed: non-deterministic runner wheel build"
            exit 1
          fi
          echo "K09_RUNNER_WHEEL_SHA256=$HASH_A" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/skuldllc/skuldbot-runner
          tags: |
            type=ref,event=tag
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ip-gate-check:${{ github.sha }}
          build-args: |
            COMPILER_VERSION=${{ github.ref_name }}
            EXECUTOR_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: IP gate — no sensitive .py installed in site-packages
        env:
          IMAGE: ip-gate-check:${{ github.sha }}
          SENSITIVE_PREFIXES: "skuldbot/nodes/,skuldbot/ai/,skuldbot/evidence/,skuldbot/policy/,skuldbot_compiler/policy/,skuldbot_compiler/templates/"
        run: |
          set -euo pipefail
          # Runner installs executor + compiler wheels offline — so sensitive .py
          # must not be present in the installed site-packages either.
          VIOLATIONS=$(docker run --rm --entrypoint python3 "$IMAGE" - <<'PY'
          import os, pathlib, sys
          import site
          prefixes = tuple(p for p in os.environ["SENSITIVE_PREFIXES"].split(",") if p)
          hits = []
          for sp in site.getsitepackages():
              root = pathlib.Path(sp)
              if not root.exists():
                  continue
              for py_file in root.rglob("*.py"):
                  rel = str(py_file.relative_to(root))
                  if any(rel.startswith(p) for p in prefixes):
                      hits.append(rel)
          for h in hits:
              print(h)
          PY
          )
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Sensitive .py installed in runner site-packages:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "runner site-packages check PASS"

      - name: IP gate — strings scan on compiled binaries in image
        env:
          IMAGE: ip-gate-check:${{ github.sha }}
        run: |
          set -euo pipefail
          PATTERN='BEGIN PROMPT|You are an expert|sk-[a-zA-Z0-9]{32,}|SKULD_ROOTED_KEY_HINT'
          # Warn-only during bootstrap
          WARN=$(docker run --rm --entrypoint bash "$IMAGE" -c "
            find /usr/local/lib -name '*.so' 2>/dev/null | while read f; do
              if strings \"\$f\" 2>/dev/null | grep -qE '$PATTERN'; then
                echo \"possible plaintext sensitive: \$f\"
              fi
            done
          ")
          if [ -n "$WARN" ]; then
            echo "::warning::strings scan:"
            echo "$WARN"
          else
            echo "strings scan PASS"
          fi

      - name: IP gate — image size sanity
        env:
          IMAGE: ip-gate-check:${{ github.sha }}
        run: |
          SIZE=$(docker inspect "$IMAGE" --format '{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 2000 ]; then
            echo "::error::image size >2GB — likely bundling regression"
            exit 1
          fi

      - name: Push to GHCR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMPILER_VERSION=${{ github.ref_name }}
            EXECUTOR_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          provenance: true
          sbom: true

      - name: Resolve primary tag
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "PRIMARY_TAG=$PRIMARY_TAG" >> "$GITHUB_ENV"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX JSON)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          syft "${PRIMARY_TAG}@${DIGEST}" -o cyclonedx-json > sbom.json
          echo "SBOM_SHA256=$(sha256sum sbom.json | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Generate build-manifest.json
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cat > build-manifest.json <<JSON
          {
            "build_id": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "builder_image": "python:3.12.12-slim@sha256:f3fa41d74a768c2fce8016b98c191ae8c1bacd8f1152870a3f9f87d350920b7c",
            "source_date_epoch": 1704067200,
            "artifact_hashes": {
              "k09_runner_wheel_sha256": "${K09_RUNNER_WHEEL_SHA256}",
              "image_digest_sha256": "${DIGEST}",
              "sbom_sha256": "${SBOM_SHA256}"
            },
            "double_build_verified": true
          }
          JSON

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest SBOM and build-manifest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes --type cyclonedx --predicate sbom.json "${PRIMARY_TAG}@${DIGEST}"
          cosign attest --yes --type https://skuldbot.dev/attestations/build-manifest/v1 --predicate build-manifest.json "${PRIMARY_TAG}@${DIGEST}"

      - name: Sign image (keyless via OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Upload reproducibility artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k13-artifacts-${{ github.run_id }}
          path: |
            sbom.json
            build-manifest.json
